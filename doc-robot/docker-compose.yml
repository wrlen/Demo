version: "3.9"

services:
  app:
    build: .
    ports:
      - "8000:8000"
      - "8501:8501"
    volumes:
      - ./data/docs:/app/data/docs
      - ./chroma_db:/app/chroma_db
      - ./feedback.jsonl:/app/feedback.jsonl
    environment:
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - LLM_MODEL=${LLM_MODEL:-qvq-max-2025-03-25}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-BAAI/bge-large-zh-v1.5}
      - EMBEDDING_DEVICE=${EMBEDDING_DEVICE:-cpu}
      - RERANKER_MODEL=${RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}
      - CHROMA_PERSIST_DIR=/app/chroma_db
      - HOST=0.0.0.0
      - PORT=8000
    restart: unless-stopped

  streamlit:
    build: .
    command: streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_PORT=8501
    restart: unless-stopped